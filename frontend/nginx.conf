server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    client_max_body_size       50m;

    # Upstream: backend on same pod
    set $backend http://127.0.0.1:8300;

    # --- Core API routes ---

    location /api/chat {
        rewrite ^/api/chat(.*)$ /chat$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/health {
        rewrite ^/api/health(.*)$ /health$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /api/visual-search {
        rewrite ^/api/visual-search(.*)$ /visual-search$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /api/visual-tags {
        rewrite ^/api/visual-tags(.*)$ /visual-tags$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /api/upload {
        rewrite ^/api/upload(.*)$ /upload$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        client_max_body_size 50m;
        proxy_read_timeout 120s;
    }

    location /api/fleet/diagnose {
        proxy_pass $backend/api/fleet/diagnose;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    location /api/3d-gen/ {
        proxy_pass $backend/api/3d-gen/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    location /3d-models/ {
        proxy_pass $backend/3d-models/;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # --- Data API routes ---

    location /api/f1data/ {
        proxy_pass $backend/api/local/f1data/;
        proxy_set_header Host $host;
    }

    location /api/mccar/ {
        proxy_pass $backend/api/local/mccar/;
        proxy_set_header Host $host;
    }

    location /api/mcdriver/ {
        proxy_pass $backend/api/local/mcdriver/;
        proxy_set_header Host $host;
    }

    location /api/mcracecontext/ {
        proxy_pass $backend/api/local/mcracecontext/;
        proxy_set_header Host $host;
    }

    location /api/mccar-summary/ {
        proxy_pass $backend/api/local/mccar-summary/;
        proxy_set_header Host $host;
    }

    location /api/mcdriver-summary/ {
        proxy_pass $backend/api/local/mcdriver-summary/;
        proxy_set_header Host $host;
    }

    # --- MongoDB-backed API routes ---

    location /api/openf1/ {
        proxy_pass $backend/api/local/openf1/;
        proxy_set_header Host $host;
    }

    location /api/driver_intel/ {
        proxy_pass $backend/api/local/driver_intel/;
        proxy_set_header Host $host;
    }

    location /api/opponents/ {
        proxy_pass $backend/api/opponents/;
        proxy_set_header Host $host;
    }

    location /api/jolpica/ {
        proxy_pass $backend/api/local/jolpica/;
        proxy_set_header Host $host;
    }

    location /api/pipeline/ {
        proxy_pass $backend/api/local/pipeline/;
        proxy_set_header Host $host;
    }

    location /api/circuit_intel/ {
        proxy_pass $backend/api/local/circuit_intel/;
        proxy_set_header Host $host;
    }

    location /api/constructor_profiles/ {
        proxy_pass $backend/api/local/constructor_profiles/;
        proxy_set_header Host $host;
    }

    location /api/constructor_profiles {
        proxy_pass $backend/api/local/constructor_profiles;
        proxy_set_header Host $host;
    }

    location /api/updater/ {
        proxy_pass $backend/api/updater/;
        proxy_set_header Host $host;
    }

    location /api/fleet-vehicles {
        proxy_pass $backend/api/fleet-vehicles;
        proxy_set_header Host $host;
    }

    # --- OmniSuite API ---

    location /api/omni/ {
        proxy_pass $backend/api/omni/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # --- Media files ---

    location /media/ {
        proxy_pass $backend/media/;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # --- GLB model files (volume-mounted) ---
    location /models/ {
        alias /usr/share/nginx/models/;
        add_header Cache-Control "public, max-age=86400, immutable";
        try_files $uri =404;
    }

    # --- Circuit SVGs ---
    location /circuits/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
