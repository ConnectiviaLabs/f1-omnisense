name: f1-omnisense

networks:
  f1net:
    driver: bridge

volumes:
  hf-cache:
  mongo-data:

services:

  # ── MongoDB: self-hosted (replaces Atlas) ────────────────────
  mongo:
    image: mongo:7
    container_name: f1-mongo
    networks:
      - f1net
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-maripf1admin}
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # ── Mongo Express: web admin UI ──────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: f1-mongo-express
    networks:
      - f1net
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-maripf1admin}
      ME_CONFIG_MONGODB_URL: mongodb://admin:${MONGO_ROOT_PASSWORD:-maripf1admin}@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo
    restart: unless-stopped

  # ── Backend: FastAPI + sentence-transformers + CLIP ──────
  backend:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    container_name: f1-backend
    networks:
      - f1net
    ports:
      - "8300:8300"
    env_file:
      - .env
    depends_on:
      - mongo
    environment:
      - API_PORT=8300
    volumes:
      - ./f1data:/app/f1data:ro
      - ./pipeline/output:/app/pipeline/output
      - ./output:/app/output
      - ./data:/app/data:ro
      - ./omnisuitef1:/app/omnisuitef1:ro
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8300/health')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ── Frontend: nginx serving Vite build ──────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        GROQ_API_KEY: ${GROQ_API_KEY:-}
    container_name: f1-frontend
    networks:
      - f1net
    ports:
      - "80:80"
    volumes:
      - ./frontend/public/models:/usr/share/nginx/models:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
