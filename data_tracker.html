<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARIP F1 — Data Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {
    --bg-deep: #080B12;
    --bg-card: #111827;
    --bg-surface: #1A2233;
    --accent: #FF8000;
    --accent-dim: rgba(255,128,0,0.12);
    --accent-glow: rgba(255,128,0,0.06);
    --text: #E5E7EB;
    --text-dim: #6B7280;
    --text-muted: #4B5563;
    --green: #22C55E;
    --yellow: #EAB308;
    --red: #EF4444;
    --blue: #3B82F6;
    --cyan: #06B6D4;
    --purple: #A855F7;
    --border: rgba(255,255,255,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Instrument Sans', system-ui, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ── Header ── */
  .header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,128,0,0.03) 0%, transparent 100%);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .header h1 span { color: var(--accent); }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 4px;
  }

  /* ── Summary Strip ── */
  .summary-strip {
    display: flex;
    gap: 1px;
    background: var(--border);
    margin: 0 40px;
    border-radius: 12px;
    overflow: hidden;
    margin-top: 20px;
  }
  .summary-cell {
    flex: 1;
    background: var(--bg-card);
    padding: 16px 20px;
    text-align: center;
  }
  .summary-cell:first-child { border-radius: 12px 0 0 12px; }
  .summary-cell:last-child { border-radius: 0 12px 12px 0; }
  .summary-cell .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }
  .summary-cell .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ── Controls ── */
  .controls {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .search-box {
    position: relative;
    flex: 0 0 280px;
  }
  .search-box input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--text-muted);
  }

  .filter-pills {
    display: flex;
    gap: 6px;
  }
  .pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    transition: all 0.2s;
    font-family: inherit;
  }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }

  .view-toggle {
    margin-left: auto;
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    border-radius: 8px;
    padding: 3px;
    border: 1px solid var(--border);
  }
  .view-btn {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--accent); color: #000; font-weight: 600; }

  /* ── Table ── */
  .table-wrap {
    padding: 0 40px 40px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    padding: 10px 14px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    background: var(--bg-deep);
    z-index: 10;
  }
  thead th:hover { color: var(--accent); }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--accent-glow); }
  td {
    padding: 10px 14px;
    white-space: nowrap;
    vertical-align: middle;
  }

  .coll-name {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 12.5px;
    color: #fff;
  }

  /* ── Badges ── */
  .category-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .cat-raw { background: rgba(59,130,246,0.15); color: var(--blue); }
  .cat-derived { background: rgba(168,85,247,0.15); color: var(--purple); }
  .cat-intel { background: rgba(6,182,212,0.15); color: var(--cyan); }
  .cat-model { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .cat-media { background: rgba(239,68,68,0.15); color: var(--red); }
  .cat-kex { background: rgba(255,128,0,0.15); color: var(--accent); }
  .cat-system { background: rgba(107,114,128,0.15); color: var(--text-dim); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }
  .status-active { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
  .status-partial { background: var(--yellow); box-shadow: 0 0 6px rgba(234,179,8,0.4); }
  .status-unused { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.3); }
  .status-meta { background: var(--text-muted); }

  .size-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .size-bar-track {
    width: 60px;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .size-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.3s;
  }

  .writers, .readers, .frontend {
    font-size: 11px;
    color: var(--text-dim);
    max-width: 220px;
    white-space: normal;
    line-height: 1.6;
  }
  .writers code, .readers code, .frontend code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: rgba(255,255,255,0.04);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text);
  }

  /* ── Card View ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
    padding: 0 40px 40px;
  }
  .data-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    transition: border-color 0.2s;
  }
  .data-card:hover { border-color: rgba(255,128,0,0.2); }
  .data-card .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .data-card .card-header .coll-name { font-size: 13px; }
  .data-card .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .data-card .stat-item {
    text-align: center;
    padding: 6px;
    background: var(--bg-surface);
    border-radius: 6px;
  }
  .data-card .stat-item .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
  }
  .data-card .stat-item .stat-lbl {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .data-card .card-pipes {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
  }
  .data-card .card-pipes strong {
    color: var(--text);
    font-weight: 500;
  }

  /* ── Hidden class ── */
  .hidden { display: none !important; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header, .controls, .table-wrap, .card-grid { padding-left: 16px; padding-right: 16px; }
    .summary-strip { margin: 20px 16px 0; flex-wrap: wrap; }
    .search-box { flex: 1 1 100%; }
  }
</style>
</head>

// ── Category config ──
const CATEGORIES = {
  all: { label: "All", class: "" },
  raw: { label: "Raw Data", class: "cat-raw" },
  derived: { label: "Derived", class: "cat-derived" },
  intel: { label: "Intelligence", class: "cat-intel" },
  model: { label: "Models", class: "cat-model" },
  kex: { label: "KeX", class: "cat-kex" },
  media: { label: "Media", class: "cat-media" },
  system: { label: "System", class: "cat-system" },
};

const STATUS_CONFIG = {
  active: { label: "Active", class: "status-active" },
  partial: { label: "Partial", class: "status-partial" },
  unused: { label: "Unused", class: "status-unused" },
  meta: { label: "Meta", class: "status-meta" },
};

// ── State ──
let currentFilter = "all";
let currentSearch = "";
let currentSort = { key: "name", asc: true };
let currentView = "table";

// ── Helpers ──
function fmtDocs(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
  return n.toString();
}
function fmtSize(mb) {
  if (mb >= 1024) return (mb / 1024).toFixed(1) + " GB";
  if (mb >= 1) return mb.toFixed(1) + " MB";
  return (mb * 1024).toFixed(0) + " KB";
}

const maxSize = Math.max(...DATA.map(d => d.sizeMB));

// ── Init ──
function init() {
  document.getElementById("lastUpdated").textContent = new Date().toISOString().slice(0, 16).replace("T", " ");

  // Summary
  const totalDocs = DATA.reduce((s, d) => s + d.docs, 0);
  const totalSize = DATA.reduce((s, d) => s + d.sizeMB, 0);
  const totalIdx = DATA.reduce((s, d) => s + d.idxCount, 0);
  const activeCount = DATA.filter(d => d.status === "active").length;

  document.getElementById("summaryStrip").innerHTML = `
    <div class="summary-cell"><div class="value">${DATA.length}</div><div class="label">Collections</div></div>
    <div class="summary-cell"><div class="value">${fmtDocs(totalDocs)}</div><div class="label">Total Docs</div></div>
    <div class="summary-cell"><div class="value">${fmtSize(totalSize)}</div><div class="label">Total Size</div></div>
    <div class="summary-cell"><div class="value">${totalIdx}</div><div class="label">Indexes</div></div>
    <div class="summary-cell"><div class="value">${activeCount}</div><div class="label">Active</div></div>
    <div class="summary-cell"><div class="value" style="color:var(--yellow)">${DATA.filter(d => d.status === "partial").length}</div><div class="label">Partial</div></div>
    <div class="summary-cell"><div class="value" style="color:var(--red)">${DATA.filter(d => d.status === "unused").length}</div><div class="label">Unused</div></div>
  `;

  // Filter pills
  const pillsEl = document.getElementById("filterPills");
  Object.entries(CATEGORIES).forEach(([key, cfg]) => {
    const count = key === "all" ? DATA.length : DATA.filter(d => d.category === key).length;
    const btn = document.createElement("button");
    btn.className = `pill${key === "all" ? " active" : ""}`;
    btn.dataset.cat = key;
    btn.textContent = `${cfg.label} (${count})`;
    btn.onclick = () => {
      pillsEl.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = key;
      render();
    };
    pillsEl.appendChild(btn);
  });

  // Search
  document.getElementById("searchInput").addEventListener("input", e => {
    currentSearch = e.target.value.toLowerCase();
    render();
  });

  // View toggle
  document.querySelectorAll(".view-btn").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentView = btn.dataset.view;
      document.getElementById("tableView").classList.toggle("hidden", currentView !== "table");
      document.getElementById("cardView").classList.toggle("hidden", currentView !== "cards");
      render();
    };
  });

  // Sort headers
  document.querySelectorAll("thead th[data-sort]").forEach(th => {
    th.onclick = () => {
      const key = th.dataset.sort;
      if (currentSort.key === key) currentSort.asc = !currentSort.asc;
      else { currentSort.key = key; currentSort.asc = true; }
      document.querySelectorAll("thead th").forEach(h => h.classList.remove("sorted"));
      th.classList.add("sorted");
      th.querySelector(".sort-arrow").textContent = currentSort.asc ? "↓" : "↑";
      render();
    };
  });

  render();
}

function getFiltered() {
  let items = DATA.filter(d => {
    if (currentFilter !== "all" && d.category !== currentFilter) return false;
    if (currentSearch && !d.name.toLowerCase().includes(currentSearch)
        && !(d.notes || "").toLowerCase().includes(currentSearch)
        && !d.writers.join(" ").toLowerCase().includes(currentSearch)
        && !d.readers.join(" ").toLowerCase().includes(currentSearch)
        && !d.frontend.join(" ").toLowerCase().includes(currentSearch)) return false;
    return true;
  });

  const sortFns = {
    name: (a, b) => a.name.localeCompare(b.name),
    docs: (a, b) => a.docs - b.docs,
    size: (a, b) => a.sizeMB - b.sizeMB,
    indexes: (a, b) => a.idxCount - b.idxCount,
    category: (a, b) => a.category.localeCompare(b.category),
    status: (a, b) => {
      const order = { active: 0, partial: 1, unused: 2, meta: 3 };
      return (order[a.status] || 9) - (order[b.status] || 9);
    },
  };

  const fn = sortFns[currentSort.key] || sortFns.name;
  items.sort((a, b) => currentSort.asc ? fn(a, b) : fn(b, a));
  return items;
}

function render() {
  const items = getFiltered();

  // Table
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = items.map(d => {
    const cat = CATEGORIES[d.category] || CATEGORIES.system;
    const st = STATUS_CONFIG[d.status] || STATUS_CONFIG.meta;
    const pct = maxSize > 0 ? Math.max(1, (d.sizeMB / maxSize) * 100) : 1;
    return `<tr>
      <td><span class="status-dot ${st.class}"></span>${st.label}</td>
      <td><span class="coll-name">${d.name}</span>${d.notes ? `<br><span style="font-size:10px;color:var(--text-muted)">${d.notes}</span>` : ""}</td>
      <td><span class="category-badge ${cat.class}">${cat.label}</span></td>
      <td class="mono" style="font-size:12px;font-weight:600">${fmtDocs(d.docs)}</td>
      <td>
        <div class="size-bar">
          <div class="size-bar-track"><div class="size-bar-fill" style="width:${pct}%"></div></div>
          <span class="mono" style="font-size:11px;color:var(--text-dim)">${fmtSize(d.sizeMB)}</span>
        </div>
      </td>
      <td class="mono" style="font-size:12px;color:var(--text-dim)">${d.idxCount}</td>
      <td class="writers">${d.writers.map(w => `<code>${w}</code>`).join(", ")}</td>
      <td class="readers">${d.readers.map(r => `<code>${r}</code>`).join(", ")}</td>
      <td class="frontend">${d.frontend.map(f => f === "—" ? `<span style="color:var(--text-muted)">—</span>` : `<code>${f}</code>`).join(", ")}</td>
    </tr>`;
  }).join("");

  // Cards
  const cardGrid = document.getElementById("cardView");
  cardGrid.innerHTML = items.map(d => {
    const cat = CATEGORIES[d.category] || CATEGORIES.system;
    const st = STATUS_CONFIG[d.status] || STATUS_CONFIG.meta;
    return `<div class="data-card">
      <div class="card-header">
        <span class="coll-name">${d.name}</span>
        <span class="category-badge ${cat.class}">${cat.label}</span>
      </div>
      <div class="card-stats">
        <div class="stat-item"><div class="stat-val">${fmtDocs(d.docs)}</div><div class="stat-lbl">Docs</div></div>
        <div class="stat-item"><div class="stat-val">${fmtSize(d.sizeMB)}</div><div class="stat-lbl">Size</div></div>
        <div class="stat-item"><div class="stat-val">${d.idxCount}</div><div class="stat-lbl">Indexes</div></div>
      </div>
      <div style="margin-bottom:8px"><span class="status-dot ${st.class}"></span><span style="font-size:11px;color:var(--text-dim)">${st.label}</span></div>
      <div class="card-pipes">
        <strong>Writers:</strong> ${d.writers.map(w => `<code>${w}</code>`).join(", ")}<br>
        <strong>Readers:</strong> ${d.readers.map(r => `<code>${r}</code>`).join(", ")}<br>
        <strong>Frontend:</strong> ${d.frontend.join(", ")}
        ${d.notes ? `<br><span style="font-size:10px;color:var(--text-muted);margin-top:4px;display:block">${d.notes}</span>` : ""}
      </div>
    </div>`;
  }).join("");
}

init();
</script>
